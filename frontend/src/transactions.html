<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Transactions — Money Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-logo">💰 MoneyMgr</div>
    <ul>
      <li><a href="dashboard.html">🏠 Dashboard</a></li>
      <li class="active"><a href="transactions.html">💳 Transactions</a></li>
      <li><a href="accounts.html">🏦 Accounts</a></li>
      <li><a href="categories.html">🏷️ Categories</a></li>
      <li><a href="budgets.html">📊 Budgets</a></li>
      <li><a href="analytics.html">📈 Analytics</a></li>
      <li><a href="recurring.html">🔁 Recurring</a></li>
      <li><a href="reports.html">📋 Reports</a></li>
      <li><a href="settings.html">⚙️ Settings</a></li>
    </ul>
    <button class="btn-logout" onclick="logout()">🚪 Logout</button>
  </nav>

  <main class="main-content">
    <div class="topbar">
      <h1>Transactions</h1>
      <button class="btn-primary" onclick="openModal()">+ Add Transaction</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <select id="filter-type" onchange="loadTransactions()">
        <option value="">All Types</option>
        <option value="income">Income</option>
        <option value="expense">Expense</option>
      </select>
      <select id="filter-category" onchange="loadTransactions()">
        <option value="">All Categories</option>
      </select>
    </div>

    <!-- Transaction list -->
    <div id="txn-list" class="section-box">Loading...</div>

  </main>
</div>

<!-- ── ADD TRANSACTION MODAL ── -->
<!-- A modal is a popup form that appears on top of the page -->
<div id="modal" class="modal" style="display:none">
  <div class="modal-box">
    <div class="modal-header">
      <h3>Add Transaction</h3>
      <button onclick="closeModal()" class="close-btn">✕</button>
    </div>
    <form onsubmit="submitTransaction(event)" enctype="multipart/form-data">
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select id="txn-type" required>
            <option value="expense">Expense</option>
            <option value="income">Income</option>
          </select>
        </div>
        <div class="form-group">
          <label>Amount (₹)</label>
          <input type="number" id="txn-amount" placeholder="0.00" step="0.01" min="0.01" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Category</label>
          <select id="txn-category" required></select>
        </div>
        <div class="form-group">
          <label>Account</label>
          <select id="txn-account" required></select>
        </div>
      </div>
      <div class="form-group">
        <label>Description (optional)</label>
        <input type="text" id="txn-desc" placeholder="What was this for?">
      </div>
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="txn-date" required>
      </div>
      <div class="form-group">
        <label>Receipt Image (optional)</label>
        <!-- File input for receipt upload -->
        <input type="file" id="txn-receipt" accept="image/*">
      </div>
      <button type="submit" class="btn-primary full-width">Save Transaction</button>
    </form>
  </div>
</div>

<script>
  const API = "http://localhost:8000";
  const token = localStorage.getItem("token");
  if (!token) window.location.href = "index.html";

  async function apiFetch(url, options = {}) {
    const res = await fetch(API + url, {
      ...options,
      headers: { Authorization: `Bearer ${token}`, ...(options.headers || {}) }
    });
    if (res.status === 401) { logout(); return null; }
    return res.json();
  }

  async function loadTransactions() {
    const type = document.getElementById("filter-type").value;
    const cat = document.getElementById("filter-category").value;
    let url = "/transactions?limit=100";
    if (type) url += `&transaction_type=${type}`;
    if (cat) url += `&category_id=${cat}`;

    const data = await apiFetch(url);
    const container = document.getElementById("txn-list");
    if (!data || data.length === 0) {
      container.innerHTML = "<p class='empty-msg'>No transactions found.</p>";
      return;
    }

    container.innerHTML = data.map(t => `
      <div class="txn-row">
        <span class="txn-icon" style="background:${t.category_color}">${t.category_icon}</span>
        <div class="txn-info">
          <span class="txn-desc">${t.description || t.category}</span>
          <span class="txn-date">${t.category} · ${t.account} · ${t.date}</span>
        </div>
        ${t.receipt_image ? `<a href="${API}/data/uploads/${t.receipt_image}" target="_blank" class="receipt-link">🧾</a>` : ""}
        <span class="txn-amount ${t.type}">${t.type === 'income' ? '+' : '-'}₹${t.amount.toLocaleString()}</span>
        <button class="btn-delete" onclick="deleteTransaction(${t.id})">🗑</button>
      </div>
    `).join("");
  }

  async function loadFormData() {
    // Populate category and account dropdowns in the form
    const [cats, accs] = await Promise.all([
      apiFetch("/categories"),
      apiFetch("/accounts")
    ]);

    // Category filter dropdown
    const filterCat = document.getElementById("filter-category");
    filterCat.innerHTML = '<option value="">All Categories</option>' +
      (cats || []).map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join("");

    // Form category dropdown
    document.getElementById("txn-category").innerHTML =
      (cats || []).map(c => `<option value="${c.id}">${c.icon} ${c.name}</option>`).join("");

    // Form account dropdown
    document.getElementById("txn-account").innerHTML =
      (accs || []).map(a => `<option value="${a.id}">${a.name} (₹${a.balance})</option>`).join("");
  }

  async function submitTransaction(e) {
    e.preventDefault();
    const formData = new FormData();
    formData.append("amount", document.getElementById("txn-amount").value);
    formData.append("transaction_type", document.getElementById("txn-type").value);
    formData.append("description", document.getElementById("txn-desc").value);
    formData.append("date", document.getElementById("txn-date").value);
    formData.append("category_id", document.getElementById("txn-category").value);
    formData.append("account_id", document.getElementById("txn-account").value);
    const receipt = document.getElementById("txn-receipt").files[0];
    if (receipt) formData.append("receipt", receipt);

    const res = await fetch(`${API}/transactions`, {
      method: "POST",
      headers: { Authorization: `Bearer ${token}` },
      body: formData
    });
    if (res.ok) {
      closeModal();
      loadTransactions();
    } else {
      const err = await res.json();
      alert(err.detail || "Error saving transaction");
    }
  }

  async function deleteTransaction(id) {
    if (!confirm("Delete this transaction?")) return;
    await apiFetch(`/transactions/${id}`, { method: "DELETE" });
    loadTransactions();
  }

  function openModal() {
    // Set today's date as default
    document.getElementById("txn-date").value = new Date().toISOString().split("T")[0];
    document.getElementById("modal").style.display = "flex";
  }
  function closeModal() { document.getElementById("modal").style.display = "none"; }
  function logout() {
    localStorage.removeItem("token"); localStorage.removeItem("username");
    window.location.href = "index.html";
  }

  // Load everything when page opens
  loadFormData();
  loadTransactions();
</script>
</body>
</html>
