<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Money Manager — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-logo">💰 Money Manager</div>

  <!-- TAB SWITCHER: Login / Register -->
  <div class="auth-tabs">
    <button class="tab-btn active" onclick="showTab('login')">Login</button>
    <button class="tab-btn" onclick="showTab('register')">Register</button>
  </div>

  <!-- ── LOGIN FORM ── -->
  <div id="login-tab">
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Username or Email</label>
        <input type="text" id="login-user" placeholder="Enter username or email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-primary full-width">Login</button>
    </form>
  </div>

  <!-- ── REGISTER FORM ── -->
  <div id="register-tab" style="display:none">
    <form onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="Choose a username" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Create a password" required>
      </div>
      <button type="submit" class="btn-primary full-width">Create Account</button>
    </form>
  </div>

  <!-- Error / success messages appear here -->
  <div id="auth-message"></div>
</div>

<script>
  const API = "http://localhost:8000"; // backend URL

  // If already logged in, go straight to dashboard
  if (localStorage.getItem("token")) {
    window.location.href = "dashboard.html";
  }

  function showTab(tab) {
    document.getElementById("login-tab").style.display = tab === "login" ? "block" : "none";
    document.getElementById("register-tab").style.display = tab === "register" ? "block" : "none";
    document.querySelectorAll(".tab-btn").forEach((b, i) => {
      b.classList.toggle("active", (i === 0 && tab === "login") || (i === 1 && tab === "register"));
    });
    document.getElementById("auth-message").innerHTML = "";
  }

  async function handleLogin(e) {
    e.preventDefault(); // stop form from reloading page
    const user = document.getElementById("login-user").value;
    const pass = document.getElementById("login-pass").value;

    // OAuth2PasswordRequestForm requires form-encoded data
    const formData = new FormData();
    formData.append("username", user);
    formData.append("password", pass);

    const res = await fetch(`${API}/login`, { method: "POST", body: formData });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.access_token);   // save token
      localStorage.setItem("username", data.username);     // save username
      window.location.href = "dashboard.html";             // go to dashboard
    } else {
      showMessage(data.detail || "Login failed", "error");
    }
  }

  async function handleRegister(e) {
    e.preventDefault();
    const formData = new FormData();
    formData.append("username", document.getElementById("reg-username").value);
    formData.append("email", document.getElementById("reg-email").value);
    formData.append("password", document.getElementById("reg-pass").value);

    const res = await fetch(`${API}/register`, { method: "POST", body: formData });
    const data = await res.json();

    if (res.ok) {
      localStorage.setItem("token", data.access_token);
      localStorage.setItem("username", data.username);
      window.location.href = "dashboard.html";
    } else {
      showMessage(data.detail || "Registration failed", "error");
    }
  }

  function showMessage(msg, type) {
    const el = document.getElementById("auth-message");
    el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  }
</script>
</body>
</html>
